aimrt:
  log:
    core_lvl: INFO # Trace/Debug/Info/Warn/Error/Fatal/Off
    backends:
      - type: console
      - type: rotate_file
        options:
          path: ./log
          filename: helloworld.log
          max_file_size_m: 4
          max_file_num: 10
  executor:
    executors:
      - name: work_executor
        type: asio_thread
        options:
          thread_num: 4
  module:
    pkgs:
      - path: ./libhelloworld_pkg.so
        enable_modules: [HelloWorldModule]

# Custom module configuration
HelloWorldModule:
  param1: val1
  param2: 2
