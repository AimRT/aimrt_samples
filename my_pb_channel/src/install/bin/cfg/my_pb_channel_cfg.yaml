# AimRT core configuration
aimrt:
  log:
    backends:
      - type: console
  executor:
    executors:
      - name: pub_thread_pool
        type: asio_thread
      - name: sub_thread_pool
        type: asio_thread
  channel:
    backends:
      - type: local
    pub_topics_options:
      - topic_name: "(.*)"
        enable_backends: [local]
    sub_topics_options:
      - topic_name: "(.*)"
        enable_backends: [local]
  module:
    pkgs:
      - path: ./libmy_pb_channel_pkg.so
        enable_modules: [NormalPublisherModule, NormalSubscriberModule]

NormalPublisherModule:
  topic_name: "example/test_topic"
  channel_frq: 1

NormalSubscriberModule:
  topic_name: "example/test_topic"
